apiVersion: v1
kind: Namespace
metadata:
  name: lade-k3d-ns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-echo
  namespace: lade-k3d-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-echo
  template:
    metadata:
      labels:
        app: http-echo
    spec:
      containers:
        - name: http-echo
          image: mendhak/http-https-echo:31
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: http-echo
  namespace: lade-k3d-ns
spec:
  selector:
    app: http-echo
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
