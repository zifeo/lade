name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  check-bump:
    runs-on: ubuntu-24.04
    if: github.ref_type == 'tag'

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}
      - name: Check version
        run: |
          VERSION=$(cargo run -- --version | cut -d' ' -f2)
          # shellcheck disable=SC2193
          if [[ "${{ github.ref_name }}" != "v$VERSION" ]]; then
            echo "Tag does not match code version v$VERSION, stopping."
            exit 1
          fi
          echo "Releasing v$VERSION"
      - uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          makeLatest: true
          generateReleaseNotes: true

  crates:
    needs:
      - check-bump
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}
      - uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          ignore-unpublished-changes: true

  binaries:
    needs:
      - check-bump
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            target: x86_64-apple-darwin
            suffix: ""
            build_cmd: cargo
          - os: macos-15
            target: aarch64-apple-darwin
            suffix: ""
            build_cmd: cargo
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            suffix: ""
            build_cmd: cross
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            suffix: ""
            build_cmd: cross
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            suffix: ""
            build_cmd: cross
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-musl
            suffix: ""
            build_cmd: cross
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}
      - name: Install cross
        if: matrix.build_cmd == 'cross'
        run: curl -L https://github.com/cross-rs/cross/releases/download/v0.2.5/cross-x86_64-unknown-linux-gnu.tar.gz | tar xz -C ~/.cargo/bin
      - name: Build
        run: ${{ matrix.build_cmd }} build --locked --release --target ${{ matrix.target }}
      - name: Compress
        shell: bash
        run: |
          mv "target/${{ matrix.target }}/release/lade${{ matrix.suffix }}" .
          asset="lade-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar czvf "$asset" "lade${{ matrix.suffix }}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$asset" > "$asset.sha256"
          else
            shasum -a 256 "$asset" > "$asset.sha256"
          fi
      - name: Upload
        uses: svenstaro/upload-release-action@v2
        with:
          tag: ${{ github.ref }}
          file: "lade-${{ github.ref_name }}-${{ matrix.target }}.tar.gz*"
          file_glob: true
          overwrite: false

  bump:
    needs:
      - crates
      - binaries
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}
      - name: Bump version
        id: bump
        run: |
          cargo install cargo-edit
          cargo set-version --bump beta
          echo "version=$(cargo metadata --format-version 1 --no-deps | jq -r .packages[0].version)" >> "$GITHUB_OUTPUT"
      - uses: peter-evans/create-pull-request@v8
        with:
          branch: bump-${{ steps.bump.outputs.version }}
          delete-branch: true
          commit-message: "chore: prepare release ${{ steps.bump.outputs.version }}"
          title: "chore: prepare release ${{ steps.bump.outputs.version }}"
          body: "Automatic suggested bump"
          base: main
